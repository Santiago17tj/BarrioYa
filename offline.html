<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sin conexión — BarrioYa</title>
  <link rel="icon" type="image/png" href="BarrioYalogo.png">
  <style>
    :root {
      --color-primary: #00C853;
      --color-accent: #FFB300;
      --color-bg: #FAFBF6;
      --color-text: #1A1A2E;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: var(--color-bg);
      color: var(--color-text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
    }
    .offline-container {
      max-width: 480px;
      animation: fadeIn 0.6s ease;
    }
    .offline-icon {
      font-size: 5rem;
      margin-bottom: 1.5rem;
      animation: float 3s ease-in-out infinite;
    }
    h1 {
      font-size: 1.8rem;
      font-weight: 800;
      margin-bottom: 0.5rem;
    }
    h1 span { color: var(--color-primary); }
    .offline-text {
      color: #64748B;
      font-size: 1.05rem;
      line-height: 1.6;
      margin-bottom: 2rem;
    }
    .btn-retry {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      background: var(--color-primary);
      color: white;
      border: none;
      padding: 0.9rem 2rem;
      border-radius: 50px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      text-decoration: none;
    }
    .btn-retry:hover {
      background: #00B848;
      transform: translateY(-2px);
      box-shadow: 0 8px 25px rgba(0, 200, 83, 0.35);
    }
    .btn-retry:active { transform: translateY(0); }
    .offline-tip {
      margin-top: 2rem;
      padding: 1rem 1.5rem;
      background: rgba(0, 200, 83, 0.08);
      border-radius: 12px;
      font-size: 0.9rem;
      color: #64748B;
    }
    .offline-tip strong { color: var(--color-text); }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }
  </style>
</head>
<body>
  <div class="offline-container">
    <div class="offline-icon">📡</div>
    <h1>Sin conexión, pero <span>BarrioYa</span> te espera</h1>
    <p class="offline-text">
      Parece que no tienes conexión a internet en este momento. 
      Revisa tu red y vuelve a intentarlo.
    </p>
    <button class="btn-retry" onclick="window.location.reload()">
      <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
      Reintentar
    </button>
    <div class="offline-tip">
      <strong>💡 Tip:</strong> Mientras tanto, puedes escribirnos directamente por 
      <a href="https://wa.me/573046279171" style="color: var(--color-primary); font-weight: 600;">WhatsApp</a> 
      para hacer tu pedido.
    </div>
  </div>
</body>
</html>
